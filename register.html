<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Daftar - JoJo Pay</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><style>:root{--bg:#080c0a;--card:#0f1613;--fg:#e4ede8;--m:#6b8a7c;--a:#00e68a;--ad:#00b36b;--ag:rgba(0,230,138,.12);--d:#ff4757;--bd:#1b2e25;--bl:#254037}[data-theme="light"]{--bg:#f0f4f2;--card:#fff;--fg:#1a2e25;--m:#6b7f74;--a:#00a86b;--ad:#008855;--ag:rgba(0,168,107,.1);--d:#e8364e;--bd:#d4dde8;--bl:#b8c9d0}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--fg);height:100dvh;overflow:hidden;transition:.3s}.wrap{position:relative;z-index:10;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 30% 30%,var(--ag),transparent 60%)}.card{width:100%;max-width:360px;background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:28px 22px;transition:.3s}.logo{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:var(--a);text-align:center;margin-bottom:4px}.sub{font-size:12px;color:var(--m);text-align:center;margin-bottom:24px}.inp{width:100%;padding:11px 12px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;color:var(--fg);font-size:14px;outline:none;transition:.15s}.inp:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--ag)}.inp::placeholder{color:var(--m);opacity:.4}.btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--a),var(--ad));color:#fff;font-weight:700;font-size:14px;border:none;border-radius:8px;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:.15s}.btn:active{transform:scale(.98)}.btn:disabled{opacity:.4}.link{color:var(--a);font-weight:600;cursor:pointer;font-size:13px}.tbtn{width:32px;height:32px;border-radius:8px;border:1px solid var(--bd);background:var(--card);color:var(--fg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:.15s}.tbtn:active{transform:scale(.9)}.info{background:var(--ag);border:1px solid var(--a);border-radius:8px;padding:8px 10px;font-size:11px;color:var(--a);margin-bottom:14px;display:flex;align-items:center;gap:6px}.toast-c{position:fixed;top:6px;left:6px;right:6px;z-index:9999}.toast{padding:10px 12px;border-radius:8px;font-size:11.5px;font-weight:500;display:flex;align-items:center;gap:7px;box-shadow:0 6px 24px rgba(0,0,0,.5);animation:ti .25s ease;border:1px solid;margin-bottom:5px}.toast-ok{background:var(--ag);border-color:var(--a);color:var(--a)}.toast-err{background:rgba(255,71,87,.1);border-color:rgba(255,71,87,.2);color:var(--d)}@keyframes ti{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}</style></head><body><div class="wrap"><div class="card"><div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button class="tbtn" onclick="toggleTheme()"><i class="fas fa-moon" id="tIco"></i></button></div><div class="logo">Daftar Merchant</div><div class="sub">Buat akun untuk menerima pembayaran</div><div class="info"><i class="fas fa-info-circle"></i><span>User pertama yang mendaftar otomatis menjadi <strong>Admin</strong></span></div><div style="display:flex;flex-direction:column;gap:10px"><input type="text" class="inp" id="u" placeholder="Username" autocomplete="off"><input type="password" class="inp" id="p" placeholder="Password" autocomplete="new-password"><input type="text" class="inp" id="s" placeholder="Nama Toko (muncul di QRIS)" style="text-transform:uppercase" autocomplete="off"><button class="btn" id="b" onclick="doReg()">Daftar Sekarang</button><div style="text-align:center;font-size:13px;color:var(--m)">Sudah punya akun? <span class="link" onclick="location.href='login.html'">Masuk</span></div></div></div></div><div class="toast-c" id="TC"></div><script>const AB='https://jojostore-production.up.railway.app';function applyTheme(t){document.documentElement.setAttribute('data-theme',t);document.getElementById('tIco').className='fas '+(t==='dark'?'fa-moon':'fa-sun');}function toggleTheme(){const n=localStorage.getItem('theme')==='light'?'dark':'light';localStorage.setItem('theme',n);applyTheme(n);}applyTheme(localStorage.getItem('theme')||'dark');function toast(m,t){const c=document.getElementById('TC'),e=document.createElement('div');e.className='toast toast-'+(t||'ok');e.innerHTML='<i class="fas '+(t==='err'?'fa-times-circle':'fa-check-circle')+'" style="font-size:13px;flex-shrink:0;"></i><span>'+m+'</span>';c.appendChild(e);setTimeout(()=>e.remove(),3000);}async function doReg(){const u=document.getElementById('u').value.trim(),p=document.getElementById('p').value,s=document.getElementById('s').value.trim();if(!u||!p||!s)return toast('Semua field wajib','err');if(u.length<3)return toast('Username min 3 karakter','err');if(p.length<4)return toast('Password min 4 karakter','err');const b=document.getElementById('b');b.disabled=true;b.textContent='Memproses...';try{const r=await fetch(AB+'/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p,storeName:s})});const d=await r.json();if(d.success){localStorage.setItem('jt',d.data.token);localStorage.setItem('jr',d.data.user.role);location.href=d.data.user.role==='admin'?'admin.html':'index.html';}else toast(d.message||'Gagal','err');}catch(e){toast('Tidak terhubung','err');}b.disabled=false;b.textContent='Daftar Sekarang';}document.getElementById('p').addEventListener('keydown',e=>{if(e.key==='Enter')doReg();});</script></body></html>
