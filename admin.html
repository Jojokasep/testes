<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Admin - JoJo Pay</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><style>:root{--bg:#080c0a;--card:#0f1613;--fg:#e4ede8;--m:#6b8a7c;--a:#00e68a;--ad:#00b36b;--ag:rgba(0,230,138,.12);--d:#ff4757;--w:#ffa502;--bd:#1b2e25;--bl:#254037;--blu:#4da6ff}[data-theme="light"]{--bg:#f0f4f2;--card:#fff;--fg:#1a2e25;--m:#6b7f74;--a:#00a86b;--ad:#008855;--ag:rgba(0,168,107,.1);--d:#e8364e;--w:#d48b00;--bd:#d4dde8;--bl:#b8c9d0}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--fg);height:100dvh;overflow:hidden;transition:.3s}.bgf{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 20% 20%,rgba(255,71,87,.03),transparent 60%),radial-gradient(ellipse at 80% 80%,var(--ag),transparent 60%)}::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--bl);border-radius:2px}main{position:relative;z-index:10;height:calc(100dvh - 54px);overflow:hidden;padding:10px 12px;display:flex;flex-direction:column}.pg{display:none;flex-direction:column;flex:1;min-height:0;animation:fu .2s ease}.pg.on{display:flex}@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}.bn{position:fixed;bottom:0;left:0;right:0;z-index:50;height:54px;background:var(--card);border-top:1px solid var(--bd);display:flex;align-items:center;flex-shrink:0;transition:.3s}[data-theme="light"] .bn{background:rgba(255,255,255,.92);backdrop-filter:blur(14px)}.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;color:var(--m);font-size:8.5px;font-weight:600;transition:.12s;padding:4px 0}.ni i{font-size:15px;transition:.12s}.ni.on{color:var(--d)}.ni.on i{transform:scale(1.1)}.ni:active{transform:scale(.9)}.cd{background:var(--card);border:1px solid var(--bd);border-radius:10px;transition:.3s}.inp{width:100%;padding:9px 10px;background:var(--bg);border:1px solid var(--bd);border-radius:7px;color:var(--fg);font-size:13px;outline:none;transition:.15s}.inp:focus{border-color:var(--d);box-shadow:0 0 0 2px rgba(255,71,87,.15)}.inp::placeholder{color:var(--m);opacity:.35}.bs{padding:5px 10px;background:transparent;color:var(--fg);font-weight:600;font-size:10px;border:1px solid var(--bl);border-radius:7px;cursor:pointer;transition:.12s}.bs:active{background:rgba(255,71,87,.1);border-color:var(--d)}.bp{padding:8px 14px;background:linear-gradient(135deg,var(--d),#cc2233);color:#fff;font-weight:700;font-size:12px;border:none;border-radius:7px;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:.12s;width:100%}.bp:active{transform:scale(.98)}.bp:disabled{opacity:.4}.ba{padding:8px 14px;background:linear-gradient(135deg,var(--a),var(--ad));color:#fff;font-weight:700;font-size:12px;border:none;border-radius:7px;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:.12s;width:100%}.ba:active{transform:scale(.98)}.ba:disabled{opacity:.4}.tb{width:32px;height:32px;border-radius:8px;border:1px solid var(--bd);background:var(--card);color:var(--fg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:.15s;flex-shrink:0}.tb:active{transform:scale(.9)}.tg{position:relative;width:40px;height:22px;flex-shrink:0}.tg input{opacity:0;width:0;height:0}.tg .sl{position:absolute;inset:0;background:var(--bl);border-radius:22px;cursor:pointer;transition:.2s}.tg .sl::before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:var(--m);left:3px;bottom:3px;transition:.2s}.tg input:checked+.sl{background:var(--d)}.tg input:checked+.sl::before{transform:translateX(18px);background:#fff}.tc{position:fixed;top:6px;left:6px;right:6px;z-index:9999;display:flex;flex-direction:column;gap:5px;pointer-events:none}.ts{padding:10px 12px;border-radius:8px;font-size:11.5px;font-weight:500;display:flex;align-items:center;gap:7px;box-shadow:0 6px 24px rgba(0,0,0,.5);animation:ti .25s ease;border:1px solid;pointer-events:auto}.ts-ok{background:var(--ag);border-color:var(--a);color:var(--a)}.ts-err{background:rgba(255,71,87,.1);border-color:rgba(255,71,87,.2);color:var(--d)}.ts-ex{animation:to .18s ease forwards}@keyframes ti{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}@keyframes to{to{opacity:0;transform:translateY(-12px)}}.mb{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(5px);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;visibility:hidden;transition:.2s}.mb.show{opacity:1;visibility:visible}.mx{background:var(--card);border:1px solid var(--bl);border-radius:14px 14px 0 0;padding:16px 14px 24px;width:100%;transform:translateY(100%);transition:transform .22s cubic-bezier(.4,0,.2,1)}.mb.show .mx{transform:translateY(0)}.mh{width:32px;height:3px;border-radius:2px;background:var(--bl);margin:0 auto 12px}.scr{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}.scr::-webkit-scrollbar{width:0}.st{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;line-height:1.2}.sd{font-size:10px;color:var(--m);margin-top:1px}.sse-d{width:6px;height:6px;border-radius:50%;display:inline-block}.sse-d.on{background:var(--a);box-shadow:0 0 5px var(--a);animation:pu 2s infinite}.sse-d.off{background:var(--d);box-shadow:0 0 5px var(--d)}@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}.ta{color:var(--a)}.tm{color:var(--m)}.td{color:var(--d)}.tw{color:var(--w)}.tb2{color:var(--blu)}.fh{font-family:'Space Grotesk',sans-serif}.sn{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;line-height:1.1}.bg{display:inline-flex;padding:2px 6px;border-radius:10px;font-size:8.5px;font-weight:600}.gs{background:var(--ag);color:var(--a)}.gf{background:rgba(255,71,87,.1);color:var(--d)}.gw{background:rgba(255,165,2,.1);color:var(--w)}.gb{background:rgba(77,166,255,.1);color:var(--blu)}.gg{background:rgba(0,230,138,.08);color:var(--a)}@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}</style></head><body><div class="bgf"></div><div class="tc" id="TC"></div><main><div class="pg on" id="pD"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-shrink:0"><div><div class="st" style="color:var(--d);"><i class="fas fa-shield-halved" style="margin-right:6px;"></i>Admin Panel</div><div class="sd">Kelola merchant & withdraw</div></div><div style="display:flex;gap:5px;align-items:center;flex-shrink:0"><span class="sse-d off" id="sD"></span><button class="tb" onclick="tTh()"><i class="fas fa-moon" id="tI"></i></button><button class="bs" style="padding:5px 8px;" onclick="doOut()" title="Logout"><i class="fas fa-right-from-bracket" style="font-size:10px;"></i></button></div></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:8px;flex-shrink:0"><div class="cd" style="padding:10px;text-align:center"><div style="font-size:8px;color:var(--m);">Merchant</div><div class="sn" style="color:var(--a);" id="sMC">0</div></div><div class="cd" style="padding:10px;text-align:center"><div style="font-size:8px;color:var(--m);">Pending Wd</div><div class="sn" style="color:var(--w);" id="sPW">0</div></div><div class="cd" style="padding:10px;text-align:center"><div style="font-size:8px;color:var(--m);">Withdraw</div><div style="font-size:11px;color:var(--m);font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;">Auto<label class="tg" id="wMTg" onchange="setWdMode(this.checked?'auto':'manual')"><input type="checkbox" checked><span class="sl"></span></label>Manual</div></div></div></div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-shrink:0"><span style="font-size:11px;font-weight:600;">Daftar Merchant</span><button class="bs" style="padding:2px 7px;font-size:9px;" onclick="lMerch()" id="bRM"><i class="fas fa-rotate" style="margin-right:2px;"></i>Refresh</button></div><div class="cd scr" style="padding:0;overflow:hidden;" id="mList"><div style="text-align:center;padding:30px 10px;color:var(--m);font-size:11px;">Belum ada merchant</div></div></div><div class="pg" id="pW"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-shrink:0;"><div><div class="st">Pending Withdraw</div><div class="sd">Menunggu persetujuan</div></div><button class="bs" style="padding:2px 7px;font-size:9px;" onclick="lWd()" id="bRW"><i class="fas fa-rotate" style="margin-right:2px;"></i>Refresh</button></div><div class="cd scr" style="padding:0;overflow:hidden;" id="wList"><div style="text-align:center;padding:30px 10px;color:var(--m);font-size:11px;">Tidak ada pending</div></div></div></main><nav class="bn"><div class="ni on" data-p="d" onclick="go('d')"><i class="fas fa-users"></i><span>Merchant</span></div><div class="ni" data-p="w" onclick="go('w')"><i class="fas fa-clock"></i><span>Withdraw</span></div></nav><div class="mb" id="mBg" onclick="cM(event)"><div class="mx" onclick="event.stopPropagation()"><div class="mh"></div><div id="mCt"></div></div></div><script>const AB='https://jojostore-production.up.railway.app';let tk=localStorage.getItem('jt')||'',me=null,sse=null;const fR=n=>(!n&&n!==0)?'Rp 0':'Rp '+Number(n).toLocaleString('id-ID');const pC=s=>Number(String(s||'').replace(/[^0-9]/g,''))||0;function tTh(){const n=localStorage.getItem('theme')==='light'?'dark':'light';localStorage.setItem('theme',n);document.documentElement.setAttribute('data-theme',n);document.getElementById('tI').className='fas '+(n==='dark'?'fa-moon':'fa-sun');}tTh(localStorage.getItem('theme')||'dark');function toast(m,t){const e=document.createElement('div');e.className='ts ts-'+(t||'ok');e.innerHTML='<i class="fas '+(t==='err'?'fa-times-circle':'fa-check-circle')+'" style="font-size:13px;flex-shrink:0;"></i><span>'+m+'</span>';document.getElementById('TC').appendChild(e);setTimeout(()=>e.remove(),3000);}function sM(h){document.getElementById('mCt').innerHTML=h;document.getElementById('mBg').classList.add('show');}function cM(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('mBg').classList.remove('show');}function go(p){document.querySelectorAll('.ni').forEach(i=>i.classList.toggle('on',i.dataset.p===p));document.querySelectorAll('.pg').forEach(s=>s.classList.remove('on'));document.getElementById('p'+p.charAt(0).toUpperCase()).classList.add('on');if(p==='d')lMerch();else if(p==='w')lWd();}async function api(p,o={}){try{const r=await fetch(AB+p,{...o,headers:{'Content-Type':'application/json',...(o.headers||{}),'Authorization':'Bearer '+tk}});const d=await r.json();if(r.status===401||r.status===403){doOut();return null;}return d;}catch(e){toast('Tidak terhubung','err');return null;}}async function lMe(){const d=await api('/auth/me');if(d?.success)me=d.data;}async function lMerch(){const b=document.getElementById('bRM');b.disabled=true;b.innerHTML='<span class="sp" style="border-color:rgba(0,230,138,.15);border-top-color:var(--a);"></span>';const d=await api('/admin/merchants');if(d?.success&&d.data.length>0){let h='';d.data.forEach(u=>{let dt=u.createdAt||'-';if(dt&&dt.length>10)dt=dt.substring(0,10);h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--bd);"><div style="min-width:0;flex:1;"><div style="font-size:12px;font-weight:600;">'+u.storeName+'</div><div style="font-size:9px;color:var(--m);">@'+u.username+' · '+dt+'</div></div><div style="display:flex;align-items:center;gap:6px;flex-shrink:0;"><div style="text-align:right;margin-right:6px;"><div style="font-size:9px;color:var(--m);">QRIS</div><div style="font-size:11px;font-weight:700;color:var(--a);">'+fR(u.balance)+'</div></div><button class="bp" style="padding:4px 10px;font-size:9px;width:auto;" onclick="delMerch(\''+u.id+'\')"><i class="fas fa-trash" style="margin-right:3px;"></i>Hapus</button></div></div>';document.getElementById('mList').innerHTML=h;document.getElementById('sMC').textContent=d.data.length;}else document.getElementById('mList').innerHTML='<div style="text-align:center;padding:30px 10px;color:var(--m);font-size:11px;">Belum ada merchant</div>';document.getElementById('sMC').textContent='0';b.disabled=false;b.innerHTML='<i class="fas fa-rotate" style="margin-right:2px;"></i>Refresh';}async function delMerch(id){sM('<div style="text-align:center;"><div style="width:48px;height:48px;border-radius:50%;background:rgba(255,71,87,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;"><i class="fas fa-trash" style="font-size:18px;color:var(--d);"></i></div><h3 class="fh" style="font-size:14px;font-weight:700;margin-bottom:3px;">Hapus Merchant?</h3><p style="color:var(--m);font-size:11px;margin-bottom:16px;">Data merchant akan dihapus permanen</p><div style="display:flex;gap:7px;"><button class="bs" style="flex:1;" onclick="cM(event)">Batal</button><button class="bp" style="flex:1;" id="bDM">Ya, Hapus</button></div></div>');document.getElementById('bDM').addEventListener('click',async function(){cM({target:document.getElementById('mBg'),currentTarget:document.getElementById('mBg')});const d=await api('/admin/merchants/'+id,{method:'DELETE'});if(d?.success){toast(d.message,'ok');lMerch();}else toast(d?.message||'Gagal','err');});}async function setWdMode(m){const d=await api('/admin/settings',{method:'POST',body:JSON.stringify({withdrawMode:m})});if(d?.success){toast('Mode withdraw: '+m,'ok');document.getElementById('wMTg').checked=m==='auto';}else toast('Gagal','err');}async function lWd(){const b=document.getElementById('bRW');b.disabled=true;b.innerHTML='<span class="sp" style="border-color:rgba(255,71,87,.15);border-top-color:var(--d);"></span>';const d=await api('/admin/withdrawals?status=pending');if(d?.success&&d.data&&d.data.length>0){let h='';d.data.forEach(w=>{let dt=w.createdAt||'-';if(dt&&dt.length>10)dt=dt.substring(0,16).replace('T',' ');h+='<div class="cd" style="padding:10px;margin-bottom:6px;border-left:3px solid var(--w);"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><div style="min-width:0;flex:1;"><div style="font-size:12px;font-weight:600;">'+w.merchantName+'</div><div style="font-size:9px;color:var(--m);">'+w.phone+'</div><div style="font-size:9px;color:var(--m);">'+dt+'</div></div><div class="fh" style="font-size:14px;font-weight:700;color:var(--w);flex-shrink:0;">'+fR(w.amount)+'</div></div><div style="display:flex;gap:5px;"><button class="ba" style="flex:1;" id="aA_'+w.id+'" onclick="approveWd(\''+w.id+'\')"><i class="fas fa-check" style="margin-right:3px;"></i>Approve</button><button class="bp" style="flex:1;" id="rJ_'+w.id+'" onclick="rejectWd(\''+w.id+'\')"><i class="fas fa-times" style="margin-right:3px;"></i>Reject</button></div></div>';});document.getElementById('wList').innerHTML=h;document.getElementById('sPW').textContent=d.data.length;}else document.getElementById('wList').innerHTML='<div style="text-align:center;padding:30px 10px;color:var(--m);font-size:11px;">Tidak ada pending</div>';document.getElementById('sPW').textContent='0';b.disabled=false;b.innerHTML='<i class="fas fa-rotate" style="margin-right:2px;"></i>Refresh';}async function approveWd(id){const b=document.getElementById('aA_'+id);b.disabled=true;b.innerHTML='<span class="sp" style="border-color:rgba(0,230,138,.2);border-top-color:#fff;"></span>';const d=await api('/admin/withdrawals/'+id+'/approve',{method:'POST'});if(d?.success){toast('Withdraw disetujui','ok');lWd();}else toast(d?.message||'Gagal','err');b.disabled=false;b.innerHTML='<i class="fas fa-check" style="margin-right:3px;"></i>Approve';}async function rejectWd(id){sM('<div style="text-align:center;"><div style="width:48px;height:48px;border-radius:50%;background:rgba(255,165,2,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;"><i class="fas fa-ban" style="font-size:18px;color:var(--w);"></i></div><h3 class="fh" style="font-size:14px;font-weight:700;margin-bottom:3px;">Tolak Withdraw?</h3><div style="background:var(--bg);border:1px solid var(--bd);border-radius:7px;padding:10px;margin-bottom:14px;text-align:left;font-size:12px;"><div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span style="color:var(--m);">Alasan tolak (opsional):</span></div><input type="text" class="inp" id="rR" placeholder="Ketik alasan..." style="font-size:12px;"></div></div><div style="display:flex;gap:7px;"><button class="bs" style="flex:1;" onclick="cM(event)">Batal</button><button class="bp" style="flex:1;" id="bRJ">Ya, Tolak</button></div></div>');document.getElementById('bRJ').addEventListener('click',async function(){cM({target:document.getElementById('mBg'),currentTarget:document.getElementById('mBg')});const reason=document.getElementById('rR').value.trim();const d=await api('/admin/withdrawals/'+id+'/reject',{method:'POST',body:JSON.stringify({reason})});if(d?.success){toast('Withdraw ditolak','ok');lWd();}else toast(d?.message||'Gagal','err');});}function cSSE(){if(sse)sse.close();try{sse=new EventSource(AB+'/admin/sse');sse.addEventListener('connected',()=>{document.getElementById('sD').className='sse-d on';});sse.addEventListener('withdraw.pending',()=>{toast('Ada withdraw baru menunggu persetujuan','ok');lWd();if(document.getElementById('pW').classList.contains('on'))lWd();});sse.onerror=()=>{document.getElementById('sD').className='sse-d off';setTimeout(cSSE,3000);};}catch(e){setTimeout(cSSE,5000);}}function doOut(){tk='';me=null;localStorage.removeItem('jt');localStorage.removeItem('jr');if(sse){sse.close();sse=null;}location.href='login.html';}document.addEventListener('keydown',e=>{if(e.key==='Escape'&&document.getElementById('mBg').classList.contains('show'))document.getElementById('mBg').classList.remove('show');});document.addEventListener('DOMContentLoaded',()=>{const r=localStorage.getItem('jr');if(r!=='admin'){location.href='login.html';return;}if(tk){lMe().then(()=>{if(me)showApp();else doOut();});}else location.href='login.html';function showApp(){document.body.style.display='';lMerch();lWd();cSSE();}});</script></body></html>
